<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntegrationHub</title>
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --text: #1a1d23;
    --muted: #6b7280;
    --border: #d1d5db;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117;
      --surface: #1a1d23;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #374151;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  .health {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
  }
  .health-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }
  .health-dot.ok { background: var(--success); }
  .health-dot.err { background: var(--danger); }
  main {
    flex: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px;
    width: 100%;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--muted);
  }
  .input-row {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  input[type="text"]:focus {
    border-color: var(--primary);
  }
  button {
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: var(--primary);
    color: #fff;
    transition: background .15s;
    white-space: nowrap;
  }
  button:hover { background: var(--primary-hover); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .status-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .status-pill.pending     { background: #fef3c7; color: #92400e; }
  .status-pill.processing  { background: #dbeafe; color: #1e40af; }
  .status-pill.completed   { background: #d1fae5; color: #065f46; }
  .status-pill.failed      { background: #fee2e2; color: #991b1b; }
  @media (prefers-color-scheme: dark) {
    .status-pill.pending    { background: #78350f; color: #fde68a; }
    .status-pill.processing { background: #1e3a5f; color: #93c5fd; }
    .status-pill.completed  { background: #064e3b; color: #6ee7b7; }
    .status-pill.failed     { background: #7f1d1d; color: #fca5a5; }
  }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .result-item {}
  .result-item .label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .result-item .value {
    font-size: 14px;
    font-weight: 500;
    word-break: break-all;
  }
  .result-item.full { grid-column: 1 / -1; }
  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
  }
  .empty-state p { margin-top: 8px; font-size: 14px; }
  .error-msg {
    padding: 12px 16px;
    border-radius: var(--radius);
    background: #fee2e2;
    color: #991b1b;
    font-size: 14px;
    margin-top: 12px;
  }
  @media (prefers-color-scheme: dark) {
    .error-msg { background: #7f1d1d; color: #fca5a5; }
  }
  .loader {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer {
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
  @media (max-width: 600px) {
    .result-grid { grid-template-columns: 1fr; }
    .input-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg>
  <h1>IntegrationHub</h1>
  <div class="health">
    <span class="health-dot" id="healthDot"></span>
    <span id="healthText">Checking...</span>
  </div>
</header>

<main>
  <div class="card">
    <h2>Order Status</h2>
    <label for="correlationId">Correlation ID</label>
    <div class="input-row">
      <input type="text" id="correlationId" placeholder="e.g. 5b5f5c5a-..." autocomplete="off" spellcheck="false">
      <button id="lookupBtn">Look up</button>
    </div>
    <div id="resultArea"></div>
  </div>

  <div class="card">
    <h2>How it works</h2>
    <p style="font-size:14px;color:var(--muted);line-height:1.7">
      External systems submit order events via the API Management gateway.
      Each event gets a unique <strong>correlation ID</strong> — use it here to
      track processing status: enrichment, queuing, and ERP delivery.
    </p>
  </div>
</main>

<footer>IntegrationHub &mdash; Cloud Integration Platform</footer>

<script>
const correlationInput = document.getElementById('correlationId');
const lookupBtn = document.getElementById('lookupBtn');
const resultArea = document.getElementById('resultArea');
const healthDot = document.getElementById('healthDot');
const healthText = document.getElementById('healthText');

async function checkHealth() {
  try {
    const res = await fetch('api/status/health');
    if (!res.ok) throw new Error();
    healthDot.className = 'health-dot ok';
    healthText.textContent = 'Healthy';
  } catch {
    healthDot.className = 'health-dot err';
    healthText.textContent = 'Unreachable';
  }
}

function statusPill(status) {
  const cls = (status || '').toLowerCase();
  return `<span class="status-pill ${cls}">${status || 'Unknown'}</span>`;
}

function renderResult(data) {
  const utc = data.lastUpdatedUtc ? new Date(data.lastUpdatedUtc).toLocaleString() : '—';
  resultArea.innerHTML = `
    <div class="result-grid" style="margin-top:16px">
      <div class="result-item">
        <div class="label">Status</div>
        <div class="value">${statusPill(data.status)}</div>
      </div>
      <div class="result-item">
        <div class="label">Last Updated</div>
        <div class="value">${utc}</div>
      </div>
      <div class="result-item full">
        <div class="label">Correlation ID</div>
        <div class="value">${data.correlationId}</div>
      </div>
      ${data.message ? `
      <div class="result-item full">
        <div class="label">Message</div>
        <div class="value">${data.message}</div>
      </div>` : ''}
    </div>`;
}

function renderError(msg) {
  resultArea.innerHTML = `<div class="error-msg">${msg}</div>`;
}

function renderEmpty() {
  resultArea.innerHTML = `
    <div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <p>Enter a correlation ID to look up order status.</p>
    </div>`;
}

async function lookupStatus(correlationId) {
  lookupBtn.disabled = true;
  lookupBtn.innerHTML = '<span class="loader"></span>';
  try {
    const res = await fetch(`api/status/${encodeURIComponent(correlationId)}`);
    if (res.status === 404) {
      renderError('No status found for this correlation ID. The event may not have been processed yet.');
      return;
    }
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      renderError(body.error || `Request failed (HTTP ${res.status})`);
      return;
    }
    const data = await res.json();
    renderResult(data);
  } catch {
    renderError('Could not reach the server. Check your connection.');
  } finally {
    lookupBtn.disabled = false;
    lookupBtn.textContent = 'Look up';
  }
}

correlationInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && correlationInput.value.trim()) {
    lookupStatus(correlationInput.value.trim());
  }
});

lookupBtn.addEventListener('click', () => {
  const val = correlationInput.value.trim();
  if (val) lookupStatus(val);
});

renderEmpty();
checkHealth();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
